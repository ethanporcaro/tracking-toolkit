name: package.yml
on:
  push:
    branches:
      - "main"
    tags:
      - "**"

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: setup variables
        run: echo "ZIP_NAME=tracking_toolkit-latest.zip" >> $GITHUB_ENV

      - name: checkout
        uses: actions/checkout@v4
      - name: download wheels
        run: |
          pip wheel --no-deps -r requirements.txt -w ./wheels
          mv ./wheels/glfw-2.10.0-py2.py27.py3.py30.py31.py32.py33.py34.py35.py36.py37.py38.p39.p310.p311.p312.p313-none-win_amd64.whl \
          ./wheels/glfw-2.10.0-py2.py27.py3.py30.py31.py32.py33.py34.py35.py36.py37.py38.py39.py310.py311.py312.py313-none-win_amd64.whl
      - name: package
        run: |
          zip -r ${{ env.ZIP_NAME }} ./* -x "images/*"

      - name: create repository manifest
        run: |
          URL=https://github.com/ethanporcaro/tracking-toolkit/releases/latest/download/${{ env.ZIP_NAME }}
          FILESIZE=$(wc -c < ${{ env.ZIP_NAME }} | awk '{print $1}')
          SHA=sha256:$( openssl dgst -sha256 ${{ env.ZIP_NAME }}| awk '{print $2}')
          
          jq \
          --arg url "$URL" \
          --argjson size "$FILESIZE" \
          --arg sha "$SHA" \
          '.data[0] += {archive_url: $url, archive_size: $size, archive_hash: $sha}' repository_base.json > repository.json
          cat repository.json
          
      - name: Create release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: |
            ${{ env.ZIP_NAME }}
            repository.json